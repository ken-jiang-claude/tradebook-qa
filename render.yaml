services:
  # ── Service 1: TradeBook Mock UI ────────────────────────────
  - type: web
    name: tradebook-mock
    runtime: static
    buildCommand: cd tradebook-mock && npm install && npm run build
    staticPublishPath: tradebook-mock/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  # ── Service 2: Living Docs (Cucumber HTML Report) ────────────
  - type: web
    name: tradebook-docs
    runtime: static
    buildCommand: mkdir -p public && cp cucumber-tests/reports/report.html public/index.html
    staticPublishPath: public
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
